name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Check gofmt
        shell: bash
        run: |
          UNFORMATTED="$(gofmt -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files need gofmt:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Check go mod tidy
        shell: bash
        run: |
          go mod tidy
          CHANGES="$(git status --porcelain -- go.mod go.sum)"
          if [ -n "$CHANGES" ]; then
            echo "go mod tidy produced changes:"
            echo "$CHANGES"
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: Check shell syntax
        run: bash -n install/install.sh scripts/bundle-macos.sh
