name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v1.2.0'
        required: true

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Validate release tag
        id: release
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ "$TAG" != v* ]]; then
            echo "Release tag must start with v: $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Check gofmt
        shell: bash
        run: |
          UNFORMATTED="$(gofmt -l .)"
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files need gofmt:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Check go mod tidy
        shell: bash
        run: |
          go mod tidy
          CHANGES="$(git status --porcelain -- go.mod go.sum)"
          if [ -n "$CHANGES" ]; then
            echo "go mod tidy produced changes:"
            echo "$CHANGES"
            git diff -- go.mod go.sum
            exit 1
          fi

      - name: Check shell syntax
        run: bash -n install/install.sh scripts/bundle-macos.sh

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.release.outputs.tag }}

      - name: Bundle macOS .app
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          BINARY="dist/sushiro-overdose_darwin_all/sushiro-overdose"
          if [ ! -f "$BINARY" ]; then
            BINARY=$(find dist -name 'sushiro-overdose' -path '*darwin*' | head -1)
          fi
          if [ -z "$BINARY" ] || [ ! -f "$BINARY" ]; then
            echo "Darwin binary not found in dist/"
            find dist -maxdepth 3 -type f | sort
            exit 1
          fi
          chmod +x scripts/bundle-macos.sh
          ./scripts/bundle-macos.sh "$BINARY" "$VERSION" dist/

      - name: Upload macOS DMG to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          gh release upload "${{ steps.release.outputs.tag }}" \
            "dist/Sushiro-Overdose-${VERSION}-macOS.dmg" \
            --clobber

      - name: Upload click-to-run Windows executables
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          mkdir -p dist/direct
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags "-s -w -H windowsgui -X main.Version=${VERSION}" \
            -o "dist/direct/Sushiro-Overdose-${VERSION}-windows-amd64.exe" .
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags "-s -w -H windowsgui -X main.Version=${VERSION}" \
            -o "dist/direct/Sushiro-Overdose-${VERSION}-windows-arm64.exe" .
          if ! ls dist/direct/*.exe >/dev/null 2>&1; then
            echo "No Windows executables found in dist/"
            find dist -maxdepth 3 -type f | sort
            exit 1
          fi
          gh release upload "${{ steps.release.outputs.tag }}" dist/direct/*.exe --clobber
