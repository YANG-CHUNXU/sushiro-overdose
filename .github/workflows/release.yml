name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle macOS .app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="dist/sushiro-overdose_darwin_all/sushiro-overdose"
          if [ ! -f "$BINARY" ]; then
            BINARY=$(find dist -name 'sushiro-overdose' -path '*darwin*' | head -1)
          fi
          chmod +x scripts/bundle-macos.sh
          ./scripts/bundle-macos.sh "$BINARY" "$VERSION" dist/

      - name: Upload macOS .app to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/Sushiro Overdose-${VERSION}-macOS.zip" \
            --clobber
