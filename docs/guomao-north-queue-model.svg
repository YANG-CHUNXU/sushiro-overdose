<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="860" viewBox="0 0 1300 860" role="img" aria-labelledby="title desc">
  <title id="title">国贸商城北区店排队数据模型</title>
  <desc id="desc">寿司郎国贸商城北区店实时叫号、用户号码判断、Turso 午间排队基准与数据流模型。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F3EA"/>
      <stop offset="52%" stop-color="#F1EFE9"/>
      <stop offset="100%" stop-color="#E8F0ED"/>
    </linearGradient>
    <linearGradient id="redPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C91F26"/>
      <stop offset="100%" stop-color="#8F1519"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#6B4A35" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8B3D28"/>
    </marker>
    <style>
      .title { font: 800 34px "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif; fill: #211817; letter-spacing: .02em; }
      .subtitle { font: 500 15px "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif; fill: #6F625C; }
      .label { font: 700 14px "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif; fill: #5A4037; letter-spacing: .06em; }
      .small { font: 500 12px "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif; fill: #7B6C65; }
      .body { font: 500 15px "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif; fill: #382825; }
      .metric { font: 800 38px "DIN Alternate", "PingFang SC", system-ui, sans-serif; fill: #201615; }
      .metricSmall { font: 800 24px "DIN Alternate", "PingFang SC", system-ui, sans-serif; fill: #201615; }
      .danger { fill: #B81C22; }
      .ok { fill: #2D9C4A; }
      .muted { fill: #91847E; }
      .card { fill: rgba(255,255,255,.88); stroke: #E5DDD4; stroke-width: 1; }
      .axis { stroke: #BFB4AB; stroke-width: 1; }
      .grid { stroke: #E1D8D0; stroke-width: 1; stroke-dasharray: 4 8; }
      .waitLine { fill: none; stroke: #B81C22; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .safeLine { fill: none; stroke: #F5BA24; stroke-width: 3; stroke-dasharray: 8 8; stroke-linecap: round; stroke-linejoin: round; }
      .bar { fill: #2E7D8A; opacity: .26; }
      .live { fill: #111827; stroke: #FFFFFF; stroke-width: 3; }
      .chip { fill: #FFF5E4; stroke: #E6CDA2; stroke-width: 1; }
      .mono { font: 700 13px "SFMono-Regular", Consolas, monospace; fill: #4C403B; }
    </style>
  </defs>

  <rect width="1300" height="860" fill="url(#bg)"/>
  <circle cx="1130" cy="80" r="170" fill="#F5BA24" opacity=".12"/>
  <circle cx="118" cy="726" r="210" fill="#B81C22" opacity=".08"/>
  <path d="M0 146 C240 98, 388 184, 612 142 S1020 80, 1300 126 L1300 0 L0 0 Z" fill="#FFFFFF" opacity=".42"/>

  <g transform="translate(54 48)">
    <text class="title" x="0" y="0" dominant-baseline="hanging">国贸商城･北区店排队数据模型</text>
    <text class="subtitle" x="0" y="48">store_id=3050 · 北京朝阳区 · 数据源：实时 getStoreById + Turso store_bucket_rollups · 生成时间 2026-06-06 12:01 CST</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="54" y="124" width="362" height="188" rx="22" fill="url(#redPanel)"/>
    <text x="82" y="160" class="label" fill="#FFEFEF">实时叫号</text>
    <text x="82" y="214" class="metric" fill="#FFFFFF">581</text>
    <text x="195" y="214" class="body" fill="#FFE7E7">号</text>
    <text x="82" y="250" class="small" fill="#FFE7E7">booth / mixed 当前带位队列：556, 571, 581</text>
    <text x="82" y="282" class="small" fill="#FFE7E7">官方等待 130 分钟 · 当前在等 18 桌 · OPEN / ONLINE</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="438" y="124" width="360" height="188" rx="22" class="card"/>
    <text x="468" y="160" class="label">截图号码判断</text>
    <text x="468" y="212" class="metric danger">534</text>
    <text x="586" y="212" class="body">号 · 卡座 · 成人 2</text>
    <text x="468" y="250" class="body">gap = 534 - 581 = -47</text>
    <text x="468" y="282" class="body danger">状态：已被当前叫号越过，需要到店确认是否过号</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="124" width="426" height="188" rx="22" class="card"/>
    <text x="850" y="160" class="label">模型输出</text>
    <text x="850" y="203" class="metricSmall danger">不是 ETA 问题，已经进入“过号风险”状态</text>
    <text x="850" y="242" class="body">如果这是仍有效号码：立即到店签到/问前台。</text>
    <text x="850" y="273" class="small">注意：官方当前等待 130 分钟适合估算新取号，不适合倒推已过号码。</text>
  </g>

  <g transform="translate(54 346)" filter="url(#shadow)">
    <rect width="792" height="412" rx="24" class="card"/>
    <text x="30" y="34" class="label">Turso 午间基准曲线（近工作日样本，低置信）</text>
    <text x="30" y="62" class="small">红线：典型等待分钟 · 黄虚线：安全等待分钟 · 蓝柱：典型在等桌数。当前周六暂无完整聚合，用近工作日作参考。</text>

    <g transform="translate(38 92)">
      <line x1="0" y1="260" x2="742" y2="260" class="axis"/>
      <line x1="0" y1="0" x2="0" y2="260" class="axis"/>
      <line x1="0" y1="210" x2="742" y2="210" class="grid"/>
      <line x1="0" y1="160" x2="742" y2="160" class="grid"/>
      <line x1="0" y1="110" x2="742" y2="110" class="grid"/>
      <line x1="0" y1="60" x2="742" y2="60" class="grid"/>
      <line x1="0" y1="10" x2="742" y2="10" class="grid"/>

      <text x="-22" y="264" text-anchor="end" class="small">0</text>
      <text x="-22" y="214" text-anchor="end" class="small">50</text>
      <text x="-22" y="164" text-anchor="end" class="small">100</text>
      <text x="-22" y="114" text-anchor="end" class="small">150</text>
      <text x="-22" y="64" text-anchor="end" class="small">200</text>
      <text x="-22" y="14" text-anchor="end" class="small">250</text>

      <rect class="bar" x="78" y="250" width="18" height="10"/>
      <rect class="bar" x="160" y="218" width="18" height="42"/>
      <rect class="bar" x="243" y="236" width="18" height="24"/>
      <rect class="bar" x="325" y="194" width="18" height="66"/>
      <rect class="bar" x="408" y="110" width="18" height="150"/>
      <rect class="bar" x="490" y="84" width="18" height="176"/>
      <rect class="bar" x="573" y="210" width="18" height="50"/>
      <rect class="bar" x="655" y="260" width="18" height="0"/>
      <rect class="bar" x="738" y="258" width="18" height="2"/>

      <polyline class="safeLine" points="0,250 82,233 165,200 247,80 330,38 412,28 495,162 577,255 660,258 742,258"/>
      <polyline class="waitLine" points="0,255 82,245 165,230 247,115 330,38 412,35 495,220 577,260 660,258 742,260"/>

      <line x1="330" y1="0" x2="330" y2="260" stroke="#111827" stroke-width="2" stroke-dasharray="5 7" opacity=".55"/>
      <circle cx="330" cy="130" r="8" class="live"/>
      <text x="344" y="126" class="mono">LIVE 12:01</text>
      <text x="344" y="145" class="small">官方等待 130 分钟</text>

      <text x="0" y="292" text-anchor="middle" class="small">10:00</text>
      <text x="82" y="292" text-anchor="middle" class="small">10:30</text>
      <text x="165" y="292" text-anchor="middle" class="small">11:00</text>
      <text x="247" y="292" text-anchor="middle" class="small">11:30</text>
      <text x="330" y="292" text-anchor="middle" class="small">12:00</text>
      <text x="412" y="292" text-anchor="middle" class="small">12:30</text>
      <text x="495" y="292" text-anchor="middle" class="small">13:00</text>
      <text x="577" y="292" text-anchor="middle" class="small">13:30</text>
      <text x="660" y="292" text-anchor="middle" class="small">14:00</text>
      <text x="742" y="292" text-anchor="middle" class="small">14:30</text>
    </g>
  </g>

  <g transform="translate(878 346)" filter="url(#shadow)">
    <rect width="368" height="412" rx="24" class="card"/>
    <text x="28" y="34" class="label">数据流与规则</text>

    <rect x="28" y="68" width="312" height="54" rx="14" class="chip"/>
    <text x="48" y="92" class="body">输入 A：截图号码</text>
    <text x="48" y="114" class="mono">target_no = 534</text>

    <rect x="28" y="148" width="312" height="66" rx="14" fill="#F3FAF8" stroke="#B9D8D0"/>
    <text x="48" y="173" class="body">输入 B：实时 API</text>
    <text x="48" y="195" class="mono">currentCalledNo = max(556,571,581)</text>

    <rect x="28" y="240" width="312" height="62" rx="14" fill="#FFF8E6" stroke="#E8C56A"/>
    <text x="48" y="264" class="body">输入 C：Turso 基准</text>
    <text x="48" y="286" class="mono">wait_typical / queue_groups</text>

    <path d="M184 122 L184 146" stroke="#8B3D28" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M184 214 L184 238" stroke="#8B3D28" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M184 302 L184 326" stroke="#8B3D28" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="28" y="328" width="312" height="58" rx="16" fill="#FDEAEA" stroke="#E8B4B4"/>
    <text x="48" y="352" class="body danger">规则：gap &lt;= 0 => 已叫过/过号风险</text>
    <text x="48" y="374" class="mono">534 - 581 = -47</text>
  </g>

  <g transform="translate(54 794)">
    <rect x="0" y="0" width="1192" height="44" rx="14" fill="#FFFFFF" opacity=".72" stroke="#E5DDD4"/>
    <text x="22" y="28" class="small">说明：Turso 当前公开聚合表未暴露周六叫号曲线和 called_no_* 字段；本 SVG 以实时叫号为决策主信号，以近工作日午间基准作为排队强度背景。</text>
  </g>
</svg>
