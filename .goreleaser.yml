version: 2

# 固定发布产物归档名前缀为 sushiro-overdose，与仓库同名、与 install/install.sh、
# install/install.ps1 下载的 URL 前缀一致；不设时 goreleaser 会用仓库目录名 sushiro，
# 导致 install 脚本拼出的下载链接 404（安装全部失败）。
project_name: sushiro-overdose

builds:
  - main: .
    binary: sushiro
    ldflags:
      - -s -w -X main.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - windows
      - linux
    goarch:
      - amd64
      - arm64

universal_binaries:
  - replace: true
    name_template: sushiro

archives:
  - format: tar.gz
    # Archive filename keeps the project/repo name; the binary inside is `sushiro`.
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Os "darwin" }}all{{ else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
