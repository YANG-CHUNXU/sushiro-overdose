<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- 简约品牌符号：正红方底填满画布（不画圆角，由系统加圆角掩码）+ 白色握寿司剪影。
       自己绘制的几何图形，非任何官方 logo。 -->
  <rect width="1024" height="1024" fill="#E60012"/>

