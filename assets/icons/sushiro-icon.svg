  <!-- 顶部三文鱼料（橙红，圆弧拱形覆盖在米上） -->
  <path d="M212 600 Q 232 360 512 360 Q 792 360 812 600 Q 760 560 700 548 Q 608 524 512 524 Q 416 524 324 548 Q 264 560 212 600 Z" fill="#F26A3C"/>

  <!-- 三文鱼纹理 -->
  <path d="M300 500 Q 380 470 460 472" stroke="#FFB59A" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M564 472 Q 644 470 724 500" stroke="#FFB59A" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M420 432 Q 512 416 604 432" stroke="#FFB59A" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.8"/>
