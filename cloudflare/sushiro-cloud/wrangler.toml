name = "sushiro-cloud"
main = "src/index.js"
compatibility_date = "2026-06-08"
workers_dev = true

[[routes]]
pattern = "sushiro-cloud.ryujo.online"
custom_domain = true

[vars]
SESSION_TTL_SECONDS = "2592000"
ALLOWED_GITHUB_LOGINS = ""

[secrets]
required = [
  "GITHUB_CLIENT_ID",
  "GITHUB_CLIENT_SECRET",
  "SESSION_SECRET",
  "TURSO_DATABASE_URL",
  "TURSO_AUTH_TOKEN",
]
